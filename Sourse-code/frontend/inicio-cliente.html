<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa - Inicio</title>
    <link rel="stylesheet" href="css/inicio-cliente.css">
</head>
<body>

    <div class="home-container">
        <header class="location-banner">
            <button class="menu-btn">☰</button>
            <div class="banner-content">
                <p>Para encontrar tu punto de encontrada automáticamente, activa los servicios de ubicación.</p>
                <button class="btn-activate">Activar ubicación</button>
            </div>
        </header>

        <section class="search-section">
            <input type="text" class="search-bar" placeholder="Describe tu problema">
        </section>

        <section class="services-section">
            <h2 class="section-title">Selección rápida</h2>
            
            <div class="services-grid">
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/1570/1570887.png" alt="Valoración"></div>
                    <span>Valoración</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/689/689305.png" alt="Tecnología"></div>
                    <span>Tecnología</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" alt="Salud"></div>
                    <span>Salud y cuidado</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/952/952733.png" alt="Plomería"></div>
                    <span>Plomería</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/1904/1904425.png" alt="Electricidad"></div>
                    <span>Electricidad</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/619/619034.png" alt="Reparaciones"></div>
                    <span>Reparaciones del hogar</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/2954/2954814.png" alt="Limpieza"></div>
                    <span>Limpieza</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/1995/1995429.png" alt="Mecánica"></div>
                    <span>Mecánica</span>
                </div>
                <div class="service-item">
                    <div class="icon-box"><img src="https://cdn-icons-png.flaticon.com/512/3047/3047928.png" alt="Mascotas"></div>
                    <span>Mascotas</span>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
