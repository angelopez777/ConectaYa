<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa | Mi Perfil</title>
    <link rel="stylesheet" href="../css/perfil-cliente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="card-perfil">
        <a href="registro-paso2.html" class="btn-atras" id="btn-volver-dinamico">
            <i class="fas fa-chevron-left"></i> Volver
        </a>

        <header class="header-perfil">
            <h1 class="logo-texto">Conecta<span>Ya</span></h1>
            <p class="instruccion">Completa tu información de residencia</p>
        </header>

        <form id="perfilForm" enctype="multipart/form-data">
            
            <div class="avatar-section">
                <div class="avatar-circle">
                    <i class="fas fa-user-circle" id="icon-placeholder"></i>
                    <img src="" id="img-preview" style="display: none; width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                </div>
                <label for="foto-input" class="btn-subir-foto">Subir Foto</label>
                <input type="file" name="foto" id="foto-input" accept="image/*" hidden>
            </div>

            <div class="input-block">
                <label>Dirección de residencia</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" name="direccion" placeholder="Ej: Calle 31 #20b-65" required>
                </div>
            </div>

            <button type="submit" class="btn-finalizar">
                CONTINUAR
            </button>
        </form>
    </main>

    <script src="../js/perfil-cliente.js"></script>
</body>
</html>
