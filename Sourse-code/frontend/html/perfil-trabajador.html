<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa | Perfil Profesional</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="../css/perfil-trabajador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="main-wrapper">
        <section class="form-card">
            <a href="registro-paso2.html" class="link-back">
                <i class="fas fa-chevron-left"></i> Volver
            </a>

            <div class="brand-header">
                <h1 class="logo-text">Conecta<span>Ya</span></h1>
                <h2 class="page-title">Perfil Profesional</h2>
                <p class="subtitle">Configura tu labor para empezar a recibir ofertas</p>
            </div>

            <form id="form-perfil-trabajador" enctype="multipart/form-data">
                <div class="photo-section">
                    <div class="avatar-wrapper">
                        <img src="" alt="Vista previa" id="img-preview" style="display:none;">
                        <label for="upload-photo" class="btn-camera"><i class="fas fa-camera"></i></label>
                        <input type="file" id="upload-photo" name="foto" accept="image/*" hidden>
                    </div>
                    <p class="photo-hint">Sube tu foto de perfil</p>
                </div>

                <div class="form-group">
                    <label class="label-neon"><i class="fas fa-briefcase"></i> Profesión u Oficio</label>
                    <input type="text" name="profesion" placeholder="Ej: Electricista, Desarrollador" required class="input-dark">
                </div>

                <div class="form-group">
                    <label class="label-neon"><i class="fas fa-history"></i> Años de Experiencia</label>
                    <input type="number" name="experiencia_anios" placeholder="Ej: 5" required class="input-dark">
                </div>

                <div class="form-group">
                    <label class="label-neon"><i class="fas fa-clock"></i> Disponibilidad</label>
                    <select name="disponibilidad" class="input-dark select-dark">
                        <option value="Tiempo Completo">Tiempo Completo</option>
                        <option value="Medio Tiempo">Medio Tiempo</option>
                        <option value="Fines de Semana">Fines de Semana</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="label-neon"><i class="fas fa-align-left"></i> Descripción del Perfil</label>
                    <textarea name="descripcion_perfil" placeholder="Cuéntales a tus clientes sobre tu trabajo..." required class="input-dark" style="min-height: 100px; resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn-main-neon">
                    Continuar a Métodos de Pago <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </section>
    </main>

    <script src="../js/perfil-trabajador.js"></script>
</body>
</html>
