<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa | Método de Pago</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/metodo-pago.css">
</head>
<body class="dark-theme">

    <main class="payment-card-premium">
        <a href="#" id="btn-volver-dinamico" class="back-navigation">
            <i class="fa-solid fa-chevron-left"></i> VOLVER
        </a>

        <header class="card-header">
            <h1 class="logo-text">Conecta<span>Ya</span></h1>
            <h2 class="section-title">Método de Pago</h2>
        </header>

        <form id="form-pago">
            <input type="hidden" name="metodo_pago" id="metodo_seleccionado" value="">

            <div class="method-selector-area">
                <div class="method-box" data-value="Transferencia">
                    <div class="icon-pago">
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                    <div class="method-info">
                        <h3>Transferencia</h3>
                        <p>Nequi, Daviplata o Bancolombia</p>
                    </div>
                </div>

                <div class="method-box" data-value="Tarjeta">
                    <div class="icon-pago">
                        <i class="fa-solid fa-credit-card"></i>
                    </div>
                    <div class="method-info">
                        <h3>Tarjeta</h3>
                        <p>Débito o Crédito</p>
                    </div>
                </div>
            </div>

            <span class="form-section-label">Información de la cuenta</span>

            <div class="input-group">
                <label>Número de cuenta o celular</label>
                <div class="input-wrapper">
                    <input type="text" name="numero_cuenta" placeholder="Ej: 311..." required>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Banco / Entidad</label>
                    <div class="input-wrapper">
                        <input type="text" name="banco_entidad" placeholder="Ej: Nequi" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Titular</label>
                    <div class="input-wrapper">
                        <input type="text" name="titular" placeholder="Nombre completo" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-finish-premium">Siguiente: Términos</button>
        </form>
    </main>

    <script src="../js/metodo-pago.js"></script>
</body>
</html>
