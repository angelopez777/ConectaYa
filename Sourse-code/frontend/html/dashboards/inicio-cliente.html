<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa | Inicio</title>
    <link rel="stylesheet" href="../../css/registro-final.css">
    <link rel="stylesheet" href="../../css/dashboard-cliente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-glow"></div>

    <nav class="nav-principal">
        <div class="logo-area">
            <h1 class="logo-texto">Conecta<span>Ya</span></h1>
        </div>
        <div class="perfil-nav">
            <span id="user-name">Cargando...</span>
            <div class="avatar-mini">
                <img src="../../assets/perfiles/default-cliente.png" alt="Perfil">
            </div>
        </div>
    </nav>

    <main class="content-wrapper">
        <section class="hero-search">
            <h2>¿A quién necesitas hoy?</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Ej: Electricista, Plomero...">
                <button>Buscar</button>
            </div>
        </section>

        <div class="categories-grid">
            <div class="card-category">Hogar</div>
            <div class="card-category">Técnico</div>
            <div class="card-category">Salud</div>
        </div>
    </main>

    <script src="../../js/dashboard-cliente.js"></script>
</body>
</html>
