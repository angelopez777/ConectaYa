<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaYa | Mi Perfil</title>
    
    <link rel="stylesheet" href="../css/estilos-perfiles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="wrapper">
        <main class="main-card">
            
            <a href="registro-paso2.html" class="back-arrow">
                <i class="fas fa-arrow-left"></i> Volver
            </a>

            <header>
                <h1 class="logo">Conecta<span>Ya</span></h1>
                <h2 class="title">Perfil Profesional</h2>
                <p class="subtitle">Personaliza tu cuenta de trabajador</p>
            </header>

            <form action="../../backend/registro/procesar-perfil.php" method="POST" enctype="multipart/form-data">
                
                <div class="avatar-section">
                    <div class="avatar-frame">
                        <img src="../assets/img/default-user.png" id="img-preview" alt="Perfil">
                        <label for="file-up" class="cam-btn">
                            <i class="fas fa-camera"></i>
                        </label>
                    </div>
                    <input type="file" name="foto" id="file-up" accept="image/*" hidden>
                </div>

                <div class="input-group">
                    <label>Dirección de Residencia</label>
                    <div class="input-icon-box">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" name="direccion" placeholder="Ej: Calle 20 #15-30, Tunja" required>
                    </div>
                </div>

                <div class="divider">
                    <span><i class="fas fa-tools"></i> Especialidad</span>
                </div>

                <div class="input-group">
                    <label>¿Qué labor realizas?</label>
                    <div class="input-icon-box">
                        <i class="fas fa-briefcase"></i>
                        <input type="text" name="labor" placeholder="Ej: Desarrollador, Plomero" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Tiempo de Experiencia</label>
                    <div class="flex-row">
                        <input type="number" name="exp_val" min="0" value="0">
                        <select name="exp_unit">
                            <option value="anos">Años</option>
                            <option value="meses">Meses</option>
                        </select>
                    </div>
                </div>

                <div class="divider">
                    <span><i class="fas fa-graduation-cap"></i> Formación</span>
                </div>

                <div class="input-group">
                    <label>Título Obtenido</label>
                    <div class="input-icon-box">
                        <i class="fas fa-certificate"></i>
                        <input type="text" name="titulo" placeholder="Ej: Técnico en Software" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Continuar a Métodos de Pago <i class="fas fa-arrow-right"></i>
                </button>

            </form>
        </main>
    </div>

    <script src="../js/perfil-trabajador.js"></script>
</body>
</html>
