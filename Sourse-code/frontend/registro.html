<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ConectaYa - Registro</title>
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="register-container">
        <h1 class="title">Registrarse</h1>
        <form class="register-form">
            <div class="input-group">
                <label>Nombre completo</label>
                <input type="text" id="reg-nombre" placeholder="Angel Lopez" required>
            </div>
            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="reg-correo" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="input-group">
                <label>Número de teléfono</label>
                <input type="tel" id="reg-telefono" placeholder="3000000000" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="reg-password" placeholder="********" required>
            </div>
            <button type="submit" class="btn-next">Siguiente</button>
        </form>
    </div>

<script src="./js/registro.js"></script>

</body>
</html>
