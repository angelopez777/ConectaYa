name: Despliegue ConectaYa
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v3

      - name: 🚀 Subir a InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Sourse-code/
          server-dir: /htdocs/Sourse-code/
          # Estas líneas ayudan con los servidores lentos:
          timeout: 90000
          protocol: ftp
